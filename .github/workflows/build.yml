name: Build APK

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run unit tests
        run: |
          chmod +x gradlew
          ./gradlew testDebugUnitTest --no-daemon

      # Fails the build on lint's error-severity issues. Missing translations
      # and format-string mismatches are errors, and both are invisible until
      # the string is shown to someone in that language.
      - name: Lint
        run: ./gradlew lintDebug --no-daemon

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RimBoard-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Attach APK to release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/debug/app-debug.apk
