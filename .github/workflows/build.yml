name: Build APK

on:
  push:
    # main only. master is a stale branch, 54 commits behind and holding a
    # single commit that reverts the codebase to v2.5.0; nothing is developed
    # there, so building it on every push was spending minutes on a snapshot
    # nobody ships. Pull requests are still built by the trigger below,
    # whatever branch they come from.
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Run unit tests
        run: |
          chmod +x gradlew
          ./gradlew testDebugUnitTest --no-daemon

      # Fails the build on lint's error-severity issues. Missing translations
      # and format-string mismatches are errors, and both are invisible until
      # the string is shown to someone in that language.
      - name: Lint
        run: ./gradlew lintDebug --no-daemon

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon

      # Built on every push, not just tags, so a release-only break shows up
      # here rather than at the moment someone cuts a release.
      - name: Build release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: RimBoard-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      # Releases must carry the release build. The debug one is debuggable,
      # which on a keyboard means anything on the device can attach to the
      # process that sees every keystroke.
      - name: Attach APK to release (tags only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
